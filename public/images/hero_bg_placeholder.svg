<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8C97A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- City skyline silhouette -->
  <rect x="0" y="500" width="80" height="300" fill="#111" opacity="0.8"/>
  <rect x="60" y="450" width="60" height="350" fill="#111" opacity="0.8"/>
  <rect x="100" y="400" width="100" height="400" fill="#151515" opacity="0.8"/>
  <rect x="180" y="480" width="70" height="320" fill="#111" opacity="0.8"/>
  <rect x="230" y="420" width="90" height="380" fill="#151515" opacity="0.8"/>
  <rect x="800" y="460" width="80" height="340" fill="#111" opacity="0.8"/>
  <rect x="860" y="400" width="100" height="400" fill="#151515" opacity="0.8"/>
  <rect x="940" y="440" width="70" height="360" fill="#111" opacity="0.8"/>
  <rect x="990" y="380" width="90" height="420" fill="#151515" opacity="0.8"/>
  <rect x="1060" y="420" width="80" height="380" fill="#111" opacity="0.8"/>
  <rect x="1120" y="470" width="80" height="330" fill="#111" opacity="0.8"/>
  <!-- Ground/road -->
  <rect x="0" y="680" width="1200" height="120" fill="#080808"/>
  <rect x="0" y="680" width="1200" height="2" fill="url(#gold)" opacity="0.3"/>
  <!-- Road markings -->
  <rect x="580" y="700" width="40" height="10" fill="#C9A84C" opacity="0.2"/>
  <rect x="580" y="730" width="40" height="10" fill="#C9A84C" opacity="0.2"/>
  <rect x="580" y="760" width="40" height="10" fill="#C9A84C" opacity="0.2"/>
  <!-- Luxury car silhouette -->
  <ellipse cx="600" cy="650" rx="200" ry="30" fill="#080808"/>
  <path d="M380 650 Q400 600 480 590 L520 580 Q560 570 600 568 Q640 570 680 580 L720 590 Q800 600 820 650 Z" fill="#1a1a1a"/>
  <path d="M440 590 Q480 555 540 548 L660 548 Q720 555 760 590 Z" fill="#111"/>
  <rect x="385" y="648" width="430" height="15" rx="4" fill="#222"/>
  <!-- Headlights glow -->
  <ellipse cx="800" cy="655" rx="20" ry="8" fill="#C9A84C" opacity="0.8"/>
  <ellipse cx="400" cy="655" rx="20" ry="8" fill="#C9A84C" opacity="0.3"/>
  <!-- Text overlay -->
  <text x="600" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="url(#gold)" opacity="0.9">ABHI LIMOUSINE SERVICES</text>
  <text x="600" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#C9A84C" opacity="0.6">SYDNEY'S PREMIER LUXURY CHAUFFEUR</text>
  <!-- Gold dots decoration -->
  <circle cx="540" cy="395" r="2" fill="#C9A84C" opacity="0.6"/>
  <circle cx="600" cy="395" r="2" fill="#C9A84C" opacity="0.6"/>
  <circle cx="660" cy="395" r="2" fill="#C9A84C" opacity="0.6"/>
</svg>
